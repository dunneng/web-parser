<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>标签页浏览器</title>
  <link rel="stylesheet" href="tab-browser.css">
</head>
<body>
  <!-- 工具栏 -->
  <div class="tb-toolbar">
    <button id="btnBack" class="tb-btn" title="返回">&larr;</button>
    <button id="btnForward" class="tb-btn" title="前进">&rarr;</button>
    <input type="text" id="tbUrlInput" class="tb-url-input" placeholder="输入网址..." autofocus>
    <button id="btnNewTab" class="tb-btn" title="新标签页">+</button>
  </div>

  <!-- Tab 标签栏 -->
  <div class="tb-tabbar" id="tbTabbar"></div>

  <!-- Webview 容器 -->
  <div class="tb-webviews" id="tbWebviews"></div>

  <script src="tab-browser.js"></script>
</body>
</html>
