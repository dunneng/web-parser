<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border: #30363d;
    --text-primary: #c9d1d9;
    --text-secondary: #8b949e;
    --accent: #58a6ff;
    --accent-hover: #79c0ff;
    --green: #3fb950;
    --orange: #d2991d;
    --red: #f85149;
    --price: #e6edf3;
    --platform-tmall: #ff0036;
    --platform-taobao: #ff5000;
    --platform-jd: #e4393c;
    --platform-pdd: #e02e24;
    --platform-1688: #ff6a00;
  }
  .theme-light {
    --bg-primary: #ffffff;
    --bg-secondary: #f6f8fa;
    --bg-tertiary: #eaeef2;
    --border: #d0d7de;
    --text-primary: #1f2328;
    --text-secondary: #656d76;
    --accent: #0969da;
    --accent-hover: #0550ae;
    --green: #1a7f37;
    --orange: #9a6700;
    --red: #cf222e;
    --price: #1f2328;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-size: 13px;
  }

  /* ── 顶栏 ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 48px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 15px; font-weight: 600; letter-spacing: 0.3px;
    display: flex; align-items: center; gap: 10px;
  }
  header h1 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .stat-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 12px;
    background: var(--bg-tertiary); border: 1px solid var(--border);
    font-size: 12px; color: var(--text-secondary);
  }
  .stat-pill .val { color: var(--text-primary); font-weight: 600; }

  .btn-header-action {
    padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg-tertiary); color: var(--text-primary);
    font-size: 12px; font-weight: 500; cursor: pointer;
    white-space: nowrap; transition: background 0.15s, border-color 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .btn-header-action:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  .btn-clear-file {
    width: 24px; height: 24px; border-radius: 50%;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-secondary); cursor: pointer;
    font-size: 12px; display: flex; align-items: center; justify-content: center;
    align-self: center; flex-shrink: 0;
    transition: all 0.15s; opacity: 0.6;
  }
  .btn-clear-file:hover { opacity: 1; background: var(--red); border-color: var(--red); color: #fff; }



  /* ── 主体 ── */
  main {
    display: flex; flex: 1; overflow: hidden;
  }

  /* ── 左侧面板 ── */
  aside {
    width: 340px; min-width: 340px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto; padding: 20px; gap: 20px;
  }
  .panel-section h3 {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .upload-zone {
    border: 2px dashed var(--border); border-radius: 10px;
    padding: 36px 28px; text-align: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .upload-zone:hover { border-color: var(--accent); background: rgba(88,166,255,0.04); }
  .upload-zone.dragover { border-color: var(--accent); background: rgba(88,166,255,0.08); }
  .upload-zone .icon { font-size: 36px; margin-bottom: 8px; }
  .upload-zone p { color: var(--text-secondary); font-size: 13px; }
  .upload-zone .hint { font-size: 11px; color: var(--text-secondary); opacity: 0.5; margin-top: 4px; }

  .url-search { display: flex; gap: 8px; }
  .url-search input {
    flex: 1; padding: 8px 12px; border-radius: 6px;
    background: var(--bg-primary); border: 1px solid var(--border);
    color: var(--text-primary); font-size: 13px; outline: none;
  }
  .url-search input:focus { border-color: var(--accent); }
  .url-search input::placeholder { color: var(--text-secondary); opacity: 0.5; }

  button {
    padding: 8px 16px; border-radius: 6px; border: none;
    font-size: 13px; font-weight: 500; cursor: pointer;
    white-space: nowrap; transition: background 0.15s, opacity 0.15s;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
  .btn-secondary {
    background: var(--bg-tertiary); color: var(--text-primary);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover:not(:disabled) { border-color: var(--accent); }

  .uploaded-preview {
    margin-top: 10px; position: relative; display: none;
    border-radius: 6px;
  }
  .preview-dual { display: flex; gap: 6px; }
  .preview-card {
    flex: 1 1 0; min-width: 0; width: 0; border-radius: 6px; overflow: hidden; position: relative;
    background: var(--bg-primary); border: 1px solid var(--border);
  }
  .preview-card .preview-label {
    font-size: 10px; color: var(--text-secondary);
    padding: 4px 8px; border-bottom: 1px solid var(--border);
    text-align: center; height: 30px; display: flex; box-sizing: border-box;
    align-items: center; justify-content: center;
  }
  .preview-card img {
    width: 100%; display: block; aspect-ratio: 1;
    object-fit: cover;
  }
  .preview-card.loading img { opacity: 0.3; }
  .preview-card.loading::after {
    content: ''; position: absolute; inset: 0;
    top: 26px;
    background: var(--bg-primary);
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    0% { opacity: 0.3; } 50% { opacity: 0.6; } 100% { opacity: 0.3; }
  }
  .uploaded-preview .remove-btn {
    position: absolute; top: 6px; right: 6px;
    width: 24px; height: 24px; border-radius: 50%;
    background: rgba(0,0,0,0.7); color: #fff; border: none;
    cursor: pointer; font-size: 14px; display: flex;
    align-items: center; justify-content: center;
    z-index: 1;
  }

  /* ── 裁剪 ── */
  .crop-btn {
    font-size: 12px; padding: 1px 6px; border-radius: 4px;
    background: var(--bg-tertiary); color: var(--text-secondary);
    border: 1px solid var(--border); cursor: pointer;
    margin-left: 4px; display: none;
  }
  .crop-btn:hover { border-color: var(--accent); color: var(--accent); }
  .crop-btn.visible { display: inline; }

  /* 裁剪弹窗 */
  .crop-modal {
    position: fixed; inset: 0; z-index: 9999;
    display: none;
  }
  .crop-modal.active { display: block; }
  .crop-modal-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.85);
  }
  .crop-modal-body {
    position: absolute; inset: 24px;
    display: flex; flex-direction: column;
    background: var(--bg-primary);
    border-radius: 12px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .crop-modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    font-size: 13px; font-weight: 600; flex-shrink: 0;
  }
  .crop-modal-header button {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--bg-tertiary); color: var(--text-secondary);
    border: 1px solid var(--border); cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .crop-modal-header button:hover { background: var(--bg-hover); color: var(--text-primary); }

  .crop-modal-stage {
    flex: 1; overflow: hidden; position: relative;
    background: #0d1117;
    /* 棋盘格背景用于显示透明区 */
    background-image:
      linear-gradient(45deg, #1a1f2b 25%, transparent 25%),
      linear-gradient(-45deg, #1a1f2b 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #1a1f2b 75%),
      linear-gradient(-45deg, transparent 75%, #1a1f2b 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    cursor: grab;
  }
  .crop-modal-stage:active { cursor: grabbing; }
  .crop-modal-stage.selecting,
  .crop-modal-stage.selecting:active { cursor: crosshair; }

  .crop-stage-inner {
    position: absolute; top: 0; left: 0;
    transform-origin: 0 0;
    will-change: transform;
  }
  .crop-stage-inner img {
    display: block;
    user-select: none; -webkit-user-drag: none;
  }
  .crop-stage-overlay {
    position: absolute; inset: 0; z-index: 2;
  }
  .crop-stage-overlay.active { display: block; }
  .crop-stage-box {
    position: absolute;
    border: 2px dashed #58a6ff;
    background: rgba(88,166,255,0.12);
    display: none; pointer-events: none; z-index: 3;
  }
  .crop-stage-box.active { display: block; }

  .crop-modal-toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-top: 1px solid var(--border);
    flex-shrink: 0;
    font-size: 12px; color: var(--text-secondary);
  }
  .crop-modal-toolbar .zoom-label { min-width: 45px; text-align: center; }
  .crop-modal-toolbar button {
    font-size: 12px; padding: 5px 12px; border-radius: 6px;
    border: 1px solid var(--border); cursor: pointer;
    background: var(--bg-tertiary); color: var(--text-primary);
  }
  .crop-modal-toolbar button:hover { background: var(--bg-hover); }
  .crop-modal-toolbar .btn-confirm {
    background: var(--accent); color: #fff; border-color: var(--accent);
    margin-left: auto;
  }
  .crop-modal-toolbar .btn-confirm:disabled {
    opacity: 0.4; cursor: not-allowed;
  }
  .crop-modal-toolbar .btn-select {
    border-color: var(--accent); color: var(--accent);
    font-weight: 500;
  }
  .crop-modal-toolbar .btn-select.on {
    background: var(--accent); color: #fff;
  }
  #previewOrig, #previewProc { cursor: pointer; }

  #searchStatus { font-size: 11px; color: var(--text-secondary); min-height: 16px; }

  /* ── 右侧表格区 ── */
  section.content {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  .table-header-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .table-header-bar .info {
    font-size: 12px; color: var(--text-secondary);
  }
  .table-header-bar .info strong { color: var(--text-primary); }

  .table-wrap {
    flex: 1; overflow-y: auto; padding: 0; position: relative;
  }
  table {
    width: 100%; border-collapse: collapse;
  }
  table thead { position: sticky; top: 0; z-index: 1; }
  table th {
    padding: 10px 16px; text-align: left;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-secondary);
    background: var(--bg-secondary); border-bottom: 1px solid var(--border);
    position: relative; user-select: none;
  }
  table td {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  table tbody tr { cursor: pointer; }
  table tbody tr:hover { background: rgba(88,166,255,0.06); }
  table tbody tr.best-price { background: rgba(63,185,80,0.06); }
  table tbody tr.best-price:hover { background: rgba(63,185,80,0.12); }

  /* ── 列拖拽引导线（hover 靠近列边界时出现，贯穿整表）── */
  .col-guide {
    position: absolute; top: 0;
    background: var(--accent);
    pointer-events: none;
    display: none;
  }

  .product-img img {
    width: 48px; height: 48px; object-fit: cover; border-radius: 4px;
    background: var(--bg-tertiary); cursor: pointer; transition: transform 0.15s;
  }
  .product-img img:hover { transform: scale(1.1); }
  .product-img .img-placeholder {
    width: 48px; height: 48px; border-radius: 4px;
    background: var(--bg-tertiary); display: flex;
    align-items: center; justify-content: center;
    font-size: 16px; color: var(--text-secondary); opacity: 0.4;
  }

  /* ── 图片预览弹窗（画廊模式）── */
  .img-gallery-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.92); display: none;
    flex-direction: column; align-items: center; justify-content: center;
    user-select: none;
  }
  .img-gallery-overlay.show { display: flex; }

  .img-gallery-topbar {
    position: absolute; top: 0; left: 0; right: 0; height: 48px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; z-index: 2;
    background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
  }
  .img-gallery-topbar .gallery-counter {
    font-size: 13px; font-weight: 600; color: #fff;
    letter-spacing: 0.5px;
  }
  .img-gallery-topbar .gallery-actions { display: flex; gap: 6px; }
  .img-gallery-topbar .gallery-actions button {
    width: 32px; height: 32px; border-radius: 8px; border: none;
    background: rgba(255,255,255,0.1); color: #fff; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .img-gallery-topbar .gallery-actions button:hover { background: rgba(255,255,255,0.25); }
  .img-gallery-topbar .gallery-actions .btn-del-img:hover { background: var(--red); }
  .img-gallery-topbar .gallery-actions .btn-edit-url:hover { background: var(--accent); }

  .img-gallery-stage {
    flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden; width: 100%;
    cursor: grab;
  }
  .img-gallery-stage.grabbing { cursor: grabbing; }
  .img-gallery-stage img {
    max-width: 90vw; max-height: 80vh;
    object-fit: contain; border-radius: 6px;
    box-shadow: 0 8px 64px rgba(0,0,0,0.6);
    transition: transform 0.15s ease-out;
  }
  .img-gallery-stage img.rotating { transition: transform 0.3s ease; }

  .img-gallery-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 48px; height: 80px; border-radius: 6px;
    background: rgba(255,255,255,0.08); color: #fff; border: none;
    cursor: pointer; font-size: 24px; z-index: 2;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .img-gallery-nav:hover { background: rgba(255,255,255,0.2); }
  .img-gallery-nav:disabled { opacity: 0.2; cursor: default; }
  .img-gallery-nav.prev { left: 16px; }
  .img-gallery-nav.next { right: 16px; }

  .img-gallery-bottombar {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    padding: 12px 16px; z-index: 2;
    background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, transparent 100%);
  }
  .img-gallery-bottombar button {
    width: 36px; height: 36px; border-radius: 8px; border: none;
    background: rgba(255,255,255,0.1); color: #fff; cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .img-gallery-bottombar button:hover { background: rgba(255,255,255,0.25); }
  .img-gallery-bottombar .zoom-label {
    font-size: 11px; color: rgba(255,255,255,0.6);
    min-width: 40px; text-align: center; margin: 0 4px;
  }
  .img-gallery-bottombar .spacer { width: 1px; background: rgba(255,255,255,0.15); margin: 0 8px; height: 20px; }

  .img-gallery-add-panel {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    display: none; gap: 6px; z-index: 3;
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .img-gallery-add-panel.show { display: flex; }
  .img-gallery-add-panel input {
    width: 380px; padding: 8px 10px; border-radius: 6px; font-size: 13px;
    background: var(--bg-primary); color: var(--text-primary);
    border: 1px solid var(--border); outline: none;
  }
  .img-gallery-add-panel input:focus { border-color: var(--accent); }
  .img-gallery-add-panel button {
    padding: 6px 12px; border-radius: 6px; font-size: 12px; white-space: nowrap;
    border: none; cursor: pointer;
  }
  .img-gallery-add-panel .btn-confirm-add { background: var(--accent); color: #fff; }
  .img-gallery-add-panel .btn-cancel-add { background: var(--bg-tertiary); color: var(--text-secondary); }

  /* ── 编辑弹窗中的图片方块 ── */
  .image-blocks {
    display: flex; flex-wrap: wrap; gap: 10px;
  }
  .image-block {
    width: 112px; flex-shrink: 0;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg-primary); overflow: hidden;
    position: relative;
  }
  .image-block .img-block-preview {
    width: 100%; height: 100px; display: flex;
    align-items: center; justify-content: center;
    background: var(--bg-tertiary); overflow: hidden;
    cursor: pointer;
  }
  .image-block .img-block-preview img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .image-block .img-block-preview .img-placeholder {
    font-size: 24px; color: var(--text-secondary); opacity: 0.4;
  }
  .image-block .img-block-url {
    padding: 4px 6px; font-size: 10px; color: var(--text-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    border-top: 1px solid var(--border);
  }
  .image-block .img-block-remove {
    position: absolute; top: 4px; right: 4px;
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(0,0,0,0.7); color: #fff; border: none;
    cursor: pointer; font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
  }
  .image-block:hover .img-block-remove { opacity: 1; }
  .image-block .img-block-remove:hover { background: var(--red); }
  .image-block .img-block-badge {
    position: absolute; top: 4px; left: 4px;
    font-size: 9px; padding: 1px 5px; border-radius: 3px;
    background: var(--accent); color: #fff; font-weight: 600;
  }
  .image-block-add {
    width: 112px; height: 100px; flex-shrink: 0;
    border: 2px dashed var(--border); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 24px; color: var(--text-secondary);
    transition: border-color 0.15s, color 0.15s;
    background: transparent;
  }
  .image-block-add:hover { border-color: var(--accent); color: var(--accent); }

  /* 图片方块加载动画 */
  .image-block .img-block-loading {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    background: var(--bg-tertiary); z-index: 1;
  }
  .image-block .img-block-loading::after {
    content: ''; width: 24px; height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: img-block-spin 0.8s linear infinite;
  }
  @keyframes img-block-spin { to { transform: rotate(360deg); } }

  .platform-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
    color: #fff;
  }
  .platform-tmall { background: var(--platform-tmall); }
  .platform-taobao { background: var(--platform-taobao); }
  .platform-jd { background: var(--platform-jd); }
  .platform-pdd { background: var(--platform-pdd); }
  .platform-1688 { background: var(--platform-1688); }
  .platform- { background: #6b7280; }
  .platform-unknown { background: #6b7280; }

  .price-cell { font-size: 16px; font-weight: 700; color: var(--price); }
  .price-cell .yuan { font-size: 12px; }
  .title-cell { max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .score-bar {
    display: flex; align-items: center; gap: 6px;
  }
  .score-bar .bar-bg {
    width: 60px; height: 5px; border-radius: 3px; background: var(--bg-tertiary);
    overflow: hidden;
  }
  .score-bar .bar-fill {
    height: 100%; border-radius: 3px; background: var(--accent);
    transition: width 0.3s;
  }
  .score-bar .val { font-size: 11px; color: var(--text-secondary); width: 34px; text-align: right; }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--text-secondary); gap: 8px;
  }
  .empty-state .big-icon { font-size: 48px; opacity: 0.3; }

  /* loading spinner */
  .spinner {
    width: 18px; height: 18px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.6s linear infinite; display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 入库进度条 ── */
  .import-progress-container {
    margin-top: 8px; display: none;
  }
  .import-progress-bar {
    position: relative;
    height: 22px; border-radius: 6px;
    background: var(--bg-tertiary);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .import-progress-fill {
    height: 100%; border-radius: 6px;
    background: linear-gradient(90deg, #2ea043, #58a6ff);
    transition: width 0.3s ease;
    position: relative;
  }
  .import-progress-fill::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(
      90deg,
      transparent 0%, rgba(255,255,255,0.12) 40%, rgba(255,255,255,0.12) 60%, transparent 100%
    );
    animation: shimmer 1.5s ease-in-out infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .import-progress-fill.done::after {
    animation: none;
    display: none;
  }
  .import-progress-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    color: var(--text-primary);
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  .import-progress-info {
    margin-top: 6px;
    font-size: 11px; color: var(--text-secondary);
    display: flex; justify-content: space-between; align-items: center;
  }
  .import-progress-info .step-badge {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    font-size: 10px; font-weight: 500;
    background: var(--bg-tertiary); color: var(--text-secondary);
    border: 1px solid var(--border);
    flex-shrink: 0; margin-left: 8px;
  }
  .import-progress-info .step-badge.ok { color: var(--green); border-color: var(--green); }
  .import-progress-info .step-badge.fail { color: var(--red); border-color: var(--red); }
  .import-progress-info .step-badge.skip { color: var(--orange); border-color: var(--orange); }
  .import-progress-info .item-title {
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    min-width: 0;
  }

  /* toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 10px 20px; border-radius: 8px; font-size: 13px;
    background: var(--bg-tertiary); border: 1px solid var(--border);
    color: var(--text-primary); z-index: 100;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* hidden file input */
  #fileInput { display: none; }

  /* ── 内容区 Tab 切换 ── */
  .content-tabs {
    display: flex; gap: 0; margin-bottom: 0;
    border-bottom: 2px solid var(--border);
  }
  .content-tab {
    padding: 8px 18px; font-size: 13px; font-weight: 500;
    color: var(--text-secondary); cursor: pointer;
    border: none; background: none;
    border-bottom: 2px solid transparent; margin-bottom: -2px;
    transition: color 0.15s, border-color 0.15s;
  }
  .content-tab:hover { color: var(--text-primary); }
  .content-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── 数据管理面板 ── */
  .mgmt-panel { display: none; flex-direction: column; flex: 1; min-height: 0; }
  .mgmt-panel.show { display: flex; }
  .mgmt-toolbar {
    display: flex; gap: 8px; align-items: center; padding: 8px 0;
    flex-wrap: wrap;
  }
  .mgmt-toolbar input[type="text"] {
    flex: 1; min-width: 160px; max-width: 280px;
    padding: 6px 10px; border-radius: 6px; font-size: 12px;
    background: var(--bg-tertiary); color: var(--text-primary);
    border: 1px solid var(--border);
  }
  .mgmt-toolbar select {
    padding: 6px 8px; border-radius: 6px; font-size: 12px;
    background: var(--bg-tertiary); color: var(--text-primary);
    border: 1px solid var(--border);
  }
  .mgmt-toolbar .btn-sm {
    padding: 5px 12px; font-size: 11px;
  }
  .mgmt-pagination {
    display: flex; gap: 4px; align-items: center;
    font-size: 12px; color: var(--text-secondary);
  }
  .mgmt-pagination button {
    padding: 3px 8px; border-radius: 4px; font-size: 11px;
    background: var(--bg-tertiary); color: var(--text-primary);
    border: 1px solid var(--border); cursor: pointer;
  }
  .mgmt-pagination button:disabled { opacity: 0.4; cursor: default; }
  .mgmt-pagination button.current {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .mgmt-table-wrap { flex: 1; overflow-y: auto; position: relative; }
  .mgmt-table { width: 100%; border-collapse: collapse; }
  .mgmt-table thead { position: sticky; top: 0; z-index: 1; }
  .mgmt-table th {
    padding: 8px 12px; text-align: left; font-size: 11px;
    font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-secondary);
    background: var(--bg-secondary); border-bottom: 1px solid var(--border);
    position: relative; user-select: none;
  }
  .mgmt-table td {
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    vertical-align: middle; font-size: 13px;
  }
  .mgmt-table tbody tr { cursor: pointer; }
  .mgmt-table tbody tr:hover { background: rgba(88,166,255,0.06); }
  .mgmt-table td.title-cell {
    max-width: 240px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mgmt-table .action-btns { display: flex; gap: 4px; }
  .mgmt-table .action-btns button {
    padding: 2px 8px; font-size: 11px; border-radius: 4px; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg-tertiary);
    color: var(--text-primary);
  }
  .mgmt-table .action-btns .btn-edit:hover { border-color: var(--accent); color: var(--accent); }
  .mgmt-table .action-btns .btn-del:hover { border-color: var(--red); color: var(--red); }

  /* ── 编辑弹窗 ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.5); display: none;
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 12px; width: 520px; max-width: 95vw; max-height: 85vh;
    overflow-y: auto; padding: 24px; box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  }
  .modal-box h2 { margin: 0; font-size: 16px; color: var(--text-primary); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .modal-tabs { display: flex; gap: 2px; background: var(--bg-tertiary); border-radius: 8px; padding: 2px; }
  .modal-tab {
    padding: 5px 14px; border: none; border-radius: 6px; font-size: 12px;
    font-family: inherit; cursor: pointer; background: transparent;
    color: var(--text-secondary); transition: all 0.15s;
  }
  .modal-tab.active { background: var(--accent); color: #fff; }
  .modal-tab:hover:not(.active) { color: var(--text-primary); }

  /* SKU 行 */
  .sku-row {
    display: flex; align-items: center; gap: 8px;
    padding: 10px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg-primary); margin-bottom: 8px;
  }
  .sku-row .sku-images {
    display: flex; gap: 4px; flex-wrap: wrap; min-width: 0; flex: 1;
  }
  .sku-row .sku-images img {
    width: 56px; height: 56px; object-fit: cover; border-radius: 4px;
    background: var(--bg-tertiary);
  }
  .sku-img-pick {
    position: relative;
    width: 56px; height: 56px; border-radius: 4px;
    border: 2px solid transparent; cursor: pointer; flex-shrink: 0;
    transition: border-color 0.15s;
  }
  .sku-img-pick img {
    width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 2px;
  }
  .sku-img-pick.sel { border-color: var(--accent); box-shadow: 0 0 6px rgba(88,166,255,0.4); }
  .sku-img-add {
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--text-secondary); border: 1px dashed var(--border);
  }
  .sku-img-add:hover { color: var(--accent); border-color: var(--accent); }
  .sku-img-remove {
    position: absolute; top: 0; right: 0;
    width: 16px; height: 16px; border: none; border-radius: 0 4px 0 4px;
    background: var(--red); color: #fff; cursor: pointer;
    font-size: 10px; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
  }
  .sku-img-pick:hover .sku-img-remove { opacity: 1; }
  .sku-pick-title { font-size: 12px; font-weight: 600; margin-bottom: 10px; color: var(--text-primary); }
  .sku-pick-grid { display: flex; gap: 6px; flex-wrap: wrap; }
  .sku-pick-item {
    position: relative; width: 64px; height: 64px; border-radius: 4px;
    overflow: hidden; cursor: pointer; border: 2px solid transparent;
    transition: border-color 0.15s;
  }
  .sku-pick-item:hover { border-color: var(--border); }
  .sku-pick-item.checked { border-color: var(--accent); }
  .sku-pick-item img { width: 100%; height: 100%; object-fit: cover; }
  .sku-pick-check {
    position: absolute; top: 2px; right: 2px;
    width: 16px; height: 16px; border-radius: 3px;
    background: var(--accent); color: #fff; font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
  }
  .sku-pick-item.checked .sku-pick-check { opacity: 1; }
  .sku-row .sku-fields {
    display: flex; gap: 6px; align-items: center; flex-shrink: 0;
  }
  .sku-row .sku-fields input {
    width: 72px; padding: 5px 6px; border-radius: 5px; font-size: 11px;
    background: var(--bg-tertiary); color: var(--text-primary);
    border: 1px solid var(--border); text-align: center;
  }
  .sku-row .sku-fields .sku-price { width: 64px; }
  .sku-actions {
    display: flex; gap: 4px; align-items: center; flex-shrink: 0;
  }
  .sku-edit-img {
    width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border);
    background: transparent; color: var(--text-secondary); cursor: pointer;
    font-size: 12px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .sku-edit-img:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .sku-del {
    width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border);
    background: transparent; color: var(--text-secondary); cursor: pointer;
    font-size: 12px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .sku-del:hover { background: var(--red); border-color: var(--red); color: #fff; }

  /* SKU 表头 */
  .sku-header {
    display: flex; align-items: center; gap: 8px;
    padding: 0 10px 8px 10px;
    font-size: 10px; font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .sku-hdr-img { flex: 1; min-width: 0; }
  .sku-hdr-fields {
    display: flex; gap: 6px; flex-shrink: 0;
  }
  .sku-hdr-col { width: 72px; text-align: center; }
  .sku-hdr-price { width: 64px; }
  .sku-hdr-actions { width: 56px; flex-shrink: 0; }
  .modal-field { margin-bottom: 12px; }
  .modal-field label {
    display: block; font-size: 11px; font-weight: 600;
    color: var(--text-secondary); margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .modal-field input, .modal-field textarea {
    width: 100%; padding: 8px 10px; border-radius: 6px; font-size: 13px;
    background: var(--bg-primary); color: var(--text-primary);
    border: 1px solid var(--border); box-sizing: border-box;
  }
  .modal-field textarea { resize: vertical; min-height: 48px; }
  .modal-field label.required::after {
    content: ' *'; color: var(--red); font-weight: 700;
  }
  .modal-field label .field-tag {
    display: inline-block; padding: 0 5px; border-radius: 3px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.3px;
    vertical-align: middle; margin-left: 4px;
  }
  .modal-field label .field-tag.required {
    background: rgba(248,81,73,0.15); color: var(--red);
  }
  .modal-field label .field-tag.optional {
    background: rgba(139,148,158,0.12); color: var(--text-secondary);
  }
  .modal-field-row { display: flex; gap: 12px; }
  .modal-field-row .modal-field { flex: 1; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .modal-actions button { padding: 8px 20px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .btn-cancel { background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-save { background: var(--accent); color: #fff; border: none; }
  .btn-save:hover { filter: brightness(1.1); }
  .btn-danger-sm {
    background: var(--red); color: #fff; border: none;
    padding: 4px 14px; border-radius: 6px; font-size: 11px; cursor: pointer;
  }
  .btn-danger-sm:hover { filter: brightness(1.15); }
  .btn-warn-sm {
    background: var(--orange); color: #fff; border: none;
    padding: 4px 14px; border-radius: 6px; font-size: 11px; cursor: pointer;
  }
  .btn-warn-sm:hover { filter: brightness(1.1); }
  .btn-warn-sm:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── 模板字段映射表 ── */
  .tpl-field-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
  .tpl-field-table th {
    text-align: left; padding: 8px 10px; font-size: 11px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-secondary); border-bottom: 1px solid var(--border);
  }
  .tpl-field-table td {
    padding: 6px 10px; border-bottom: 1px solid var(--border);
    font-size: 13px; vertical-align: middle;
  }
  .tpl-field-table .field-key {
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 12px; color: var(--accent);
  }
  .tpl-field-table .field-label { color: var(--text-primary); }
  .tpl-field-table .badge-required {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.3px;
  }
  .badge-required.yes { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge-required.no { background: rgba(139,148,158,0.12); color: var(--text-secondary); }
  .tpl-field-table input {
    width: 100%; padding: 7px 10px; border-radius: 6px; font-size: 13px;
    background: var(--bg-primary); color: var(--text-primary);
    border: 1px solid var(--border); box-sizing: border-box;
  }
  .tpl-field-table input:focus { border-color: var(--accent); }
  .tpl-field-table input::placeholder { color: var(--text-secondary); opacity: 0.4; }
  /* Toggle 开关 */
  .toggle-switch { position: relative; display: inline-block; width: 36px; height: 20px; flex-shrink: 0; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--border); border-radius: 20px; transition: 0.2s; }
  .toggle-slider::before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.2s; }
  .toggle-switch input:checked + .toggle-slider { background: var(--accent); }
  .toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); }
</style>
</head>
<body>

<header>
  <h1><span class="dot"></span> 跨平台比价控制台</h1>
  <div class="header-right">
    <div class="stat-pill" id="pillTotal">商品 <span class="val">0</span></div>
    <div class="stat-pill" id="pillVector">向量 <span class="val">0</span></div>
    <button class="btn-header-action" id="btnOpenBatchImport" title="批量入库 Excel/CSV/JSON/DB">📦 入库</button>
    <div class="stat-pill" style="color:var(--green)">运行中</div>
  </div>
</header>

<main>
  <aside>
    <div class="panel-section">
      <h3>🖼️ 以图搜同款</h3>
      <div class="upload-zone" id="uploadZone">
        <div class="icon">⬆️</div>
        <p>拖拽图片到此处或点击上传</p>
        <div class="hint">支持 JPG、PNG、WebP</div>
      </div>
      <input type="file" id="fileInput" accept="image/*">
      <div class="uploaded-preview" id="preview">
        <div class="preview-dual">
          <div class="preview-card" id="previewOrigCard">
            <div class="preview-label">
              🖼️ 原始图片
              <button class="crop-btn" id="btnCrop" title="裁剪商品区域">✂️ 裁剪</button>
            </div>
            <img id="previewOrig" src="" alt="原图" style="object-fit:contain">
          </div>
          <div class="preview-card" id="previewProcCard">
            <div class="preview-label">✨ 去背景</div>
            <img id="previewProc" src="" alt="去背景" style="object-fit:contain">
          </div>
        </div>
        <button class="remove-btn" id="removePreview">✕</button>
      </div>
      <div id="searchStatus"></div>
      <div style="display:flex;gap:6px;margin-top:10px">
        <select id="selPlatformFilter" style="flex:1;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border);padding:6px;border-radius:6px;font-size:12px">
          <option value="">全部平台</option>
          <option value="taobao">淘宝</option>
          <option value="tmall">天猫</option>
          <option value="jd">京东</option>
          <option value="pdd">拼多多</option>
          <option value="1688">1688</option>
        </select>
        <button class="btn-primary" id="btnSearchImage" disabled style="flex:1">
          🔍 搜索同款
        </button>
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-secondary);cursor:pointer;user-select:none;margin-top:8px">
        <span class="toggle-switch">
          <input type="checkbox" id="chkSearchSkipRembg">
          <span class="toggle-slider"></span>
        </span>
        <span id="rembgLabelSearch" style="font-size:11px">🖼️ 原始图片</span>
      </label>
    </div>

    <div class="panel-section">
      <h3>🔗 链接搜同款</h3>
      <div class="url-search">
        <input type="text" id="urlInput" placeholder="粘贴商品链接或图片链接...">
        <button class="btn-primary" id="btnSearchUrl">搜索</button>
      </div>
    </div>

    <div class="panel-section">
      <h3>💬 文字搜同款</h3>
      <div class="url-search">
        <input type="text" id="textSearchInput" placeholder="输入中文描述，如「红色熊猫冰箱贴」...">
        <button class="btn-primary" id="btnSearchText">搜索</button>
      </div>
    </div>

  </aside>

  <!-- 右侧结果表格 -->
  <section class="content">
    <!-- Tab 切换 -->
    <div class="content-tabs">
      <button class="content-tab active" id="tabSearch">🔍 搜索结果</button>
      <button class="content-tab" id="tabMgmt">📋 数据管理</button>
    </div>

    <!-- 搜索结果面板 -->
    <div id="searchPanel">
      <div class="table-header-bar">
        <span class="info" id="resultInfo">等待查询…</span>
        <div style="display:flex;align-items:center;gap:10px">
          <button class="btn-secondary" id="btnSendToParser" style="display:none;font-size:12px;padding:5px 12px">
            📤 发送到解析器
          </button>
          <span id="spinner" class="spinner"></span>
        </div>
      </div>
      <div class="table-wrap">
        <table id="resultTable">
          <thead>
            <tr>
              <th style="width:84px">图片</th>
              <th>商品标题</th>
              <th>平台</th>
              <th>匹配规格</th>
              <th>价格</th>
              <th>店铺</th>
              <th>相似度</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
        <div class="empty-state" id="emptyState">
          <div class="big-icon">🔍</div>
          <p>上传图片或粘贴链接开始搜索</p>
        </div>
      </div>
    </div>

    <!-- 数据管理面板 -->
    <div class="mgmt-panel" id="mgmtPanel">
      <div class="mgmt-toolbar">
        <input type="text" id="mgmtSearch" placeholder="搜索商品标题或店铺…">
        <select id="mgmtPlatform">
          <option value="">全平台</option>
          <option value="taobao">淘宝</option>
          <option value="tmall">天猫</option>
          <option value="jd">京东</option>
          <option value="pdd">拼多多</option>
          <option value="1688">阿里巴巴</option>
        </select>
        <button class="btn-secondary btn-sm" id="btnMgmtSearch">搜索</button>
        <button class="btn-warn-sm" id="btnRepairPlatforms" title="根据商品链接自动识别平台并修复">🔍 检测平台</button>
        <span style="flex:1"></span>
        <button class="btn-danger-sm" id="btnBatchDelete" style="display:none">🗑 批量删除</button>
        <button class="btn-primary btn-sm" id="btnExport" style="margin-left:6px">📥 导出</button>

<script>
const API = 'http://127.0.0.1:19527/api/price-compare';
const STATIC = 'http://127.0.0.1:19527/static';
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);
let _overlayDownTarget = null;
document.addEventListener('mousedown', e => { _overlayDownTarget = e.target; }, true);
// 辅助：只有 mousedown 在遮罩上才触发关闭（避免选中文字时误关弹窗）
const _didClickOverlay = (e, overlay) => e.target === overlay && _overlayDownTarget === overlay;

// ── 图片 URL 构建 ──
function buildImageUrl(p, imageIndex) {
  // 优先用专用 API 端点（带索引）
  if (p.id) {
    const idx = (imageIndex != null) ? imageIndex : (p.matched_image_index != null ? p.matched_image_index : 0);
    if (idx > 0) return `${API}/image/${p.id}/${idx}`;
    return `${API}/image/${p.id}`;
  }
  // 兜底：有 matched_image_index 时取对应的远程 URL
  if (p.matched_image_index != null && p.matched_image_index > 0 && p.image_urls && p.image_urls.length >= p.matched_image_index) {
    return p.image_urls[p.matched_image_index - 1];
  }
  return p.main_image_url || '';
}
function imageHtml(p, size) {
  size = size || 48;
  const src = buildImageUrl(p);
  const fallbackUrl = escAttr(p.main_image_url || '');
  const clickSrc = escAttr(src || p.main_image_url || '');

  // 完全无图片时显示占位符（不可点击预览）
  if (!src && !p.main_image_url) {
    return `<div class="img-placeholder" style="width:${size}px;height:${size}px">🖼️</div>`;
  }

  // 用容器包裹，点击事件绑定在容器上 —— 无论 img 是否加载成功都能预览
  const startIdx = (p.matched_image_index != null) ? p.matched_image_index : 0;
  return `<div style="width:${size}px;height:${size}px;cursor:pointer;display:inline-block;vertical-align:top"
      onclick="event.stopPropagation();openImageGallery(${p.id}, ${startIdx})"
      title="点击预览大图（多图可翻页）">
    <img src="${src}" loading="lazy"
      onerror="this.style.display='none';var fb=this.parentElement.querySelector('.img-fallback');if(fb)fb.style.display='flex'"
      style="width:${size}px;height:${size}px;object-fit:cover;border-radius:4px;background:var(--bg-tertiary)">
    <div class="img-placeholder img-fallback" style="width:${size}px;height:${size}px;display:none" title="本地图片加载失败，点此查看远程图片">🖼️</div>
  </div>`;
}

// ── 中英文表头映射 ──
const HEADER_CN = {
  title: '商品标题', platform: '平台', price: '价格', shop_name: '店铺',
  main_image_url: '主图', platform_url: '链接', original_price: '原价',
  stock_info: '库存/销量', shipping: '运费', local_image: '本地图',
  score: '相似度', id: 'ID', status: '状态', source: '来源',
  description: '描述', image_urls: '多图', category: '分类',
};
function cnHeader(key) { return HEADER_CN[key] || key; }
function escAttr(s) { return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;'); }

let uploadedFile = null;
let currentResults = [];

// ── 发送到网页解析器 query 系统 ──
async function sendToParser() {
  if (!currentResults.length) return;
  const sendBtn = $('#btnSendToParser');
  sendBtn.disabled = true;
  sendBtn.textContent = '发送中...';
  try {
    const res = await fetch('http://127.0.0.1:19527/api/query/inject-price-compare', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ results: currentResults })
    });
    const d = await res.json();
    if (d.ok) {
      toast(`已发送 ${d.count} 条商品到解析器 · 在解析器中点击「比价数据」加载`);
    } else {
      toast('发送失败');
    }
  } catch (e) {
    toast('发送失败: ' + e.message);
  }
  sendBtn.disabled = false;
  sendBtn.textContent = '📤 发送到解析器';
}
$('#btnSendToParser').addEventListener('click', sendToParser);

// ── 顶栏统计 ──
async function loadStats() {
  try {
    const r = await fetch(`${API}/stats`); const d = await r.json();
    if (!d.ok) return;
    $('#pillTotal .val').textContent = d.product_count?.total || 0;
    $('#pillVector .val').textContent = d.vector_count || 0;
    // 各平台明细
    const pc = d.product_count || {};
    let html = '';
    for (const [k,v] of Object.entries(pc)) {
      if (k === 'total') continue;
      html += `<div>${platformLabel(k)}: <strong>${v}</strong></div>`;
    }
    if (!html) html = '<div>暂无数据</div>';
    const sd = $('#statsDetail'); if (sd) sd.innerHTML = html;
  } catch(e) { console.error('stats:', e); }
}
function platformLabel(k) {
  const m = {taobao:'淘宝', tmall:'天猫', jd:'京东', pdd:'拼多多', '1688':'阿里巴巴'};
  if (!k || k === 'unknown') return '未知';
  return m[k] || k;
}

// ── 占位图 DOM 元素（供 onerror 替换用）──
// 已废弃：imageHtml 现在用容器包裹 + fallback div，不再需要此函数
// function placeholderEl(size) { ... }

// ── 裁剪状态 ──
let cropBlob = null; // 裁剪后的 blob

// ── 图片上传 ──
const zone = $('#uploadZone');
const fileInput = $('#fileInput');
zone.addEventListener('click', () => fileInput.click());
zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', (e) => {
  e.preventDefault(); zone.classList.remove('dragover');
  handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

async function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) { toast('请选择图片文件'); return; }
  uploadedFile = file;
  cropBlob = null;
  // 先绑定 onload 再设 src，避免 blob URL 同步加载时事件已触发
  const url = URL.createObjectURL(file);
  $('#previewOrig').onload = () => { $('#btnCrop').classList.add('visible'); };
  $('#previewOrig').src = url;
  $('#preview').style.display = 'block';
  $('#uploadZone').style.display = 'none';
  $('#btnSearchImage').disabled = false;
  $('#searchStatus').textContent = `已选择: ${file.name}`;
  // 兜底：如果图片已缓存（complete），直接显示按钮
  if ($('#previewOrig').complete) $('#btnCrop').classList.add('visible');

  // 去背景预览（全图）—— 仅在开关打开时请求
  if ($('#chkSearchSkipRembg').checked) {
    await fetchProcessedPreview(file);
  } else {
    $('#previewProcCard').style.display = 'none';
    $('#previewProc').src = '';
  }
}

// 拉取去背景预览
async function fetchProcessedPreview(blob) {
  const procCard = $('#previewProcCard');
  procCard.style.display = '';
  procCard.classList.add('loading');
  $('#previewProc').src = '';
  try {
    const form = new FormData();
    form.append('file', blob, blob.name || 'image.png');
    const resp = await fetch('http://127.0.0.1:19527/api/bg-remove/preview', { method: 'POST', body: form });
    const data = await resp.json();
    if (data.ok) {
      $('#previewProc').src = data.processed;
    } else {
      console.error('bg-remove preview failed:', data.error);
    }
  } catch(e) {
    console.error('bg-remove preview error:', e);
  } finally {
    procCard.classList.remove('loading');
  }
}

// toggle 开关实时控制去背景图显隐
$('#chkSearchSkipRembg').addEventListener('change', () => {
  const on = $('#chkSearchSkipRembg').checked;
  $('#rembgLabelSearch').textContent = on ? '✂️ 背景抠图' : '🖼️ 原始图片';
  if (on) {
    // 打开：显示去背景卡片，如果已上传但还没去背景图则拉取
    if (uploadedFile && !$('#previewProc').getAttribute('src')) {
      fetchProcessedPreview(cropBlob || uploadedFile);
    } else {
      $('#previewProcCard').style.display = '';
    }
  } else {
    $('#previewProcCard').style.display = 'none';
  }
});

// 入库侧 toggle 文字切换
$('#chkSkipRembg').addEventListener('change', () => {
  $('#rembgLabelImport').textContent = $('#chkSkipRembg').checked ? '✂️ 背景抠图' : '🖼️ 原始图片';
});

// ── 裁剪弹窗 ──
const CM = {
  scale: 1, tx: 0, ty: 0,            // 变换状态
  selecting: false,                    // 是否在框选模式
  drawing: false,                      // 正在画框选
  sx: 0, sy: 0, ex: 0, ey: 0,        // 框选坐标（stage 空间）
  panning: false, lastX: 0, lastY: 0, // 拖动平移
};

function openCropModal() {
  bindCropModalEvents();
  const img = $('#previewOrig');
  if (!img.src) { toast('请先上传图片'); return; }
  $('#cropStageImg').src = img.src;
  CM.scale = 1; CM.tx = 0; CM.ty = 0;
  CM.selecting = false; CM.drawing = false;
  resetCropBox();
  applyTransform();
  // 初始适配：让图片填满 stage
  const stage = $('#cropStage');
  setTimeout(() => {
    const iw = img.naturalWidth, ih = img.naturalHeight;
    const sw = stage.clientWidth, sh = stage.clientHeight;
    const fit = Math.min(sw / iw, sh / ih, 1);
    CM.scale = fit;
    CM.tx = (sw - iw * fit) / 2;
    CM.ty = (sh - ih * fit) / 2;
    applyTransform();
  }, 50);
  $('#cropModal').classList.add('active');
  updateSelectBtn();
}

function closeCropModal() {
  $('#cropModal').classList.remove('active');
  resetCropBox();
  CM.selecting = false; CM.drawing = false;
}

function applyTransform() {
  $('#cropStageInner').style.transform = `translate(${CM.tx}px,${CM.ty}px) scale(${CM.scale})`;
  $('#cropZoomLabel').textContent = Math.round(CM.scale * 100) + '%';
}

function updateSelectBtn() {
  const btn = $('#cropToggleSelect');
  btn.textContent = CM.selecting ? '✓ 框选中' : '框选';
  btn.classList.toggle('on', CM.selecting);
  const stage = $('#cropStage');
  stage.classList.toggle('selecting', CM.selecting);
}

function resetCropBox() {
  $('#cropStageBox').classList.remove('active');
  $('#cropModalConfirm').disabled = true;
  CM.sx = CM.sy = CM.ex = CM.ey = 0;
}

function updateStageBox() {
  const box = $('#cropStageBox');
  const l = Math.min(CM.sx, CM.ex), t = Math.min(CM.sy, CM.ey);
  const w = Math.abs(CM.ex - CM.sx), h = Math.abs(CM.ey - CM.sy);
  box.style.left = l + 'px';
  box.style.top = t + 'px';
  box.style.width = w + 'px';
  box.style.height = h + 'px';
}

// 延迟绑定（crop modal 的 DOM 在 <script> 之后，需懒加载）
let _cropModalBound = false;
function bindCropModalEvents() {
  if (_cropModalBound) return;
  _cropModalBound = true;

  // 缩放（滚轮）
  $('#cropStage').addEventListener('wheel', (e) => {
    e.preventDefault();
    if (CM.drawing) return;
    const rect = $('#cropStage').getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.12 : 0.9;
    const newScale = Math.max(0.2, Math.min(10, CM.scale * factor));
    // 以光标为中心缩放
    CM.tx = cx - (cx - CM.tx) * newScale / CM.scale;
    CM.ty = cy - (cy - CM.ty) * newScale / CM.scale;
    CM.scale = newScale;
    applyTransform();
    // 缩放后更新框选（如果有的话）
    if ($('#cropStageBox').classList.contains('active')) updateStageBox();
  });

  // 拖动平移 / 框选
  $('#cropStage').addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    const rect = $('#cropStage').getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if (CM.selecting) {
      // 框选模式
      CM.drawing = true;
      CM.sx = mx; CM.sy = my;
      CM.ex = mx; CM.ey = my;
      $('#cropStageBox').classList.add('active');
      updateStageBox();
    } else {
      // 平移模式
      CM.panning = true;
      CM.lastX = e.clientX;
      CM.lastY = e.clientY;
    }
  });

  window.addEventListener('mousemove', (e) => {
    if (CM.panning) {
      CM.tx += e.clientX - CM.lastX;
      CM.ty += e.clientY - CM.lastY;
      CM.lastX = e.clientX;
      CM.lastY = e.clientY;
      applyTransform();
    }
    if (CM.drawing) {
      const rect = $('#cropStage').getBoundingClientRect();
      CM.ex = e.clientX - rect.left;
      CM.ey = e.clientY - rect.top;
      updateStageBox();
    }
  });

  window.addEventListener('mouseup', () => {
    if (CM.drawing) {
      CM.drawing = false;
      const w = Math.abs(CM.ex - CM.sx);
      const h = Math.abs(CM.ey - CM.sy);
      if (w < 10 || h < 10) {
        $('#cropStageBox').classList.remove('active');
      } else {
        $('#cropModalConfirm').disabled = false;
        updateStageBox();
      }
    }
    CM.panning = false;
  });

  $('#cropModalClose').addEventListener('click', closeCropModal);
  $('#cropModalCancel').addEventListener('click', closeCropModal);
  $('#cropToggleSelect').addEventListener('click', () => {
    CM.selecting = !CM.selecting;
    updateSelectBtn();
    if (!CM.selecting) resetCropBox();
  });

  $('#cropResetView').addEventListener('click', () => {
    const img = $('#cropStageImg');
    const sw = $('#cropStage').clientWidth, sh = $('#cropStage').clientHeight;
    const iw = img.naturalWidth, ih = img.naturalHeight;
    const fit = Math.min(sw / iw, sh / ih, 1);
    CM.scale = fit;
    CM.tx = (sw - iw * fit) / 2;
    CM.ty = (sh - ih * fit) / 2;
    applyTransform();
    resetCropBox();
  });

  $('#cropModalConfirm').addEventListener('click', async () => {
    const img = $('#cropStageImg');
    const iw = img.naturalWidth, ih = img.naturalHeight;
    const sx = Math.round(Math.max(0, Math.min(CM.sx, CM.ex) - CM.tx) / CM.scale);
    const sy = Math.round(Math.max(0, Math.min(CM.sy, CM.ey) - CM.ty) / CM.scale);
    const sw = Math.round(Math.abs(CM.ex - CM.sx) / CM.scale);
    const sh = Math.round(Math.abs(CM.ey - CM.sy) / CM.scale);
    if (sw < 1 || sh < 1 || sx + sw > iw || sy + sh > ih) {
      toast('裁剪区域超出图片范围'); return;
    }

    const canvas = document.createElement('canvas');
    canvas.width = sw; canvas.height = sh;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);

    canvas.toBlob(async (blob) => {
      if (!blob) { toast('裁剪失败'); return; }
      cropBlob = blob;
      closeCropModal();

      $('#previewOrig').src = URL.createObjectURL(blob);
      // 去背景预览 —— 仅在开关打开时请求
      if ($('#chkSearchSkipRembg').checked) {
        await fetchProcessedPreview(blob);
      } else {
        $('#previewProcCard').style.display = 'none';
        $('#previewProc').src = '';
      }
      $('#searchStatus').textContent = '裁剪完成 ✓';
    }, 'image/png');
  });
}

async function searchByImage() {
  switchTab('search');
  const fileToSend = cropBlob || uploadedFile;
  if (!fileToSend) return;
  setLoading(true);
  const fd = new FormData(); fd.append('file', fileToSend);
  const platform = $('#selPlatformFilter').value;
  let qs = platform ? `?top_k=20&platform=${encodeURIComponent(platform)}` : '?top_k=20';
  if (!$('#chkSearchSkipRembg').checked) qs += '&skip_rembg=1';
  try {
    const r = await fetch(`${API}/search-by-image${qs}`, { method:'POST', body:fd });
    const d = await r.json();
    if (!d.ok) {
      toast('搜索失败: ' + (d.error || '未知错误'));
      setLoading(false);
      $('#resultInfo').textContent = '以图搜图 · 搜索失败';
      return;
    }
    renderResults(d.results || [], '以图搜图');
  } catch(e) { toast('搜索失败: ' + e.message); setLoading(false); }
}

async function searchByUrl() {
  switchTab('search');
  const url = $('#urlInput').value.trim();
  if (!url) return;

  // 检测是否为图片链接
  const isImageUrl = /\.(jpg|jpeg|png|gif|webp|bmp)(\?.*)?$/i.test(url) || /\/(image|img|photo|picture)\//i.test(url);

  if (isImageUrl) {
    // 图片链接 → 下载 → 预览 → 以图搜图（复用抠图逻辑）
    setLoading(true);
    $('#searchStatus').textContent = '正在加载图片…';
    try {
      const imgResp = await fetch(API + '/proxy-image?url=' + encodeURIComponent(url));
      if (!imgResp.ok) throw new Error('图片加载失败');
      const blob = await imgResp.blob();
      uploadedFile = new File([blob], 'search-image.' + (blob.type.split('/')[1] || 'jpg'), { type: blob.type });
      cropBlob = null;
      const dataUrl = URL.createObjectURL(blob);
      $('#previewOrig').src = dataUrl;
      $('#preview').style.display = 'block';
      $('#uploadZone').style.display = 'none';
      $('#btnSearchImage').disabled = false;
      $('#searchStatus').textContent = '图片已加载，可点击 🔍 搜索同款';
      setLoading(false);

      // 抠图预览：toggle 开时才去背景
      if ($('#chkSearchSkipRembg').checked) {
        await fetchProcessedPreview(blob);
      } else {
        $('#previewProcCard').style.display = 'none';
        $('#previewProc').src = '';
      }
    } catch(e) {
      toast('图片加载失败: ' + e.message);
      setLoading(false);
      $('#searchStatus').textContent = '';
    }
    return;
  }

  // 商品链接 → 现有逻辑
  setLoading(true);
  try {
    const r = await fetch(`${API}/search-by-url?url=${encodeURIComponent(url)}&top_k=20`);
    const d = await r.json();
    if (!d.ok) {
      toast('搜索失败: ' + (d.error || '未知错误'));
      setLoading(false);
      $('#resultInfo').textContent = '链接搜索 · 搜索失败';
      return;
    }
    renderResults(d.results || [], '链接搜索');
  } catch(e) { toast('搜索失败: ' + e.message); setLoading(false); }
}

async function searchByText() {

// 保存原始搜索结果表头（预览可能会覆盖它）
const _resultTheadOrig = document.querySelector('#resultTable thead tr').innerHTML;
function renderResults(results, mode) {
  setLoading(false);
  const tbody = $('#resultBody');
  const info = $('#resultInfo');
  const empty = $('#emptyState');
  const sendBtn = $('#btnSendToParser');

  // 恢复原始表头（预览可能改了它）
  const theadTr = document.querySelector('#resultTable thead tr');
  if (theadTr.innerHTML !== _resultTheadOrig) theadTr.innerHTML = _resultTheadOrig;

  // 缓存原始结果供「发送到解析器」使用
  currentResults = results;
  sendBtn.style.display = results.length ? '' : 'none';

  if (!results.length) {
    tbody.innerHTML = '';
    info.textContent = `${mode} · 无匹配结果`;
    empty.style.display = 'flex';
    return;
  }

  empty.style.display = 'none';
  info.innerHTML = `${mode} · 找到 <strong>${results.length}</strong> 个匹配商品`;

  // 找最低价（优先匹配 SKU 价格）
  let minPrice = Infinity;
  results.forEach(r => {
    const p = r.matched_sku_price != null ? r.matched_sku_price : (r.price || 0);
    if (p > 0 && p < minPrice) minPrice = p;
  });

  tbody.innerHTML = results.map(r => {
    const scorePct = r.score ? (r.score * 100).toFixed(0) : 0;
    const displayPrice = r.matched_sku_price != null ? r.matched_sku_price : (r.price || 0);
    const isBest = minPrice < Infinity && displayPrice === minPrice;
    const cls = isBest ? 'best-price' : '';

    // SKU 规格信息
    let skuText = '-';
    if (r.matched_sku_color || r.matched_sku_size) {
      skuText = [r.matched_sku_color, r.matched_sku_size].filter(Boolean).join(' / ') || '-';
    }

    return `<tr class="${cls}">
      <td class="product-img">${imageHtml(r, 72)}</td>
      <td class="title-cell" title="${esc(r.title)}">${esc(r.title)}</td>
      <td><span class="platform-badge platform-${r.platform}">${platformLabel(r.platform)}</span></td>
      <td class="sku-cell">${skuText}</td>
      <td class="price-cell"><span class="yuan">¥</span>${displayPrice.toFixed(2)}</td>
      <td>${esc(r.shop_name || '-')}</td>
      <td>
        <div class="score-bar">
          <div class="bar-bg"><div class="bar-fill" style="width:${scorePct}%"></div></div>
          <span class="val">${scorePct}%</span>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function setLoading(loading) {
  $('#spinner').style.display = loading ? 'inline-block' : 'none';
}

function toast(msg) {
  const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

$('#btnStartImport').addEventListener('click', async () => {
  if (!importFile) return;
  const form = new FormData();
  form.append('file', importFile);
  form.append('template_name', $('#selImportTemplate').value);
  if (!$('#chkSkipRembg').checked) form.append('skip_rembg', '1');
  $('#btnStartImport').disabled = true;
  $('#btnPreviewImport').disabled = true;
  $('#importProgress').style.display = 'block';
  $('#importProgressBar').style.width = '0%';
  $('#importProgressBar').classList.remove('done');
  $('#importProgressPct').textContent = '0%';
  $('#importCurrentItem').textContent = '';
  $('#importStepBadge').style.display = 'none';
  $('#importStatus').textContent = '正在提交...';
  try {
    // 1. 提交导入 → 获得 job_id
    const submitRes = await fetch(API + '/import', { method: 'POST', body: form });
    const submitData = await submitRes.json();
    if (!submitData.ok) {
      $('#importStatus').textContent = '❌ ' + (submitData.error || '提交失败');
      return;
    }
    const jobId = submitData.job_id;
    const total = submitData.total;

    // 辅助函数：秒数格式化
    const fmtETA = s => { s = Math.round(s); return s <= 0 ? '' : s < 60 ? `${s}秒` : s < 3600 ? `${Math.floor(s/60)}分${s%60}秒` : `${Math.floor(s/3600)}时${Math.round((s%3600)/60)}分`; };

    // 2. 轮询进度
    while (true) {
      await new Promise(r => setTimeout(r, 500));
      const statusRes = await fetch(API + '/import-status/' + jobId);
      const sd = await statusRes.json();
      if (!sd.ok) { $('#importStatus').textContent = '进度查询失败'; return; }

      const p = sd.progress;
      const done = p.done;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      $('#importProgressBar').style.width = pct + '%';
      $('#importProgressPct').textContent = pct + '% (' + done + '/' + total + ')';

      // 当前商品信息
      if (p.current) {
        let stepText = p.step || '';
        // 补充图片级进度
        if (p.img_cur != null && p.img_total != null) {
          stepText = p.step + ' · 图 ' + p.img_cur + '/' + p.img_total;
        }
        const icon = stepText.startsWith('下载') || stepText.startsWith('向量化') ? '🖼' : stepText === '完成' ? '✅' : stepText === '失败' ? '❌' : stepText.startsWith('检查字段') || stepText.startsWith('🔍') ? '🔍' : '⏳';
        $('#importCurrentItem').textContent = icon + ' ' + p.current;
        // 步骤徽章
        const badge = $('#importStepBadge');
        badge.style.display = 'inline-block';
        badge.textContent = stepText;
        badge.className = 'step-badge';
        if (stepText.startsWith('完成')) badge.className += ' ok';
        else if (stepText.startsWith('失败')) badge.className += ' fail';
        else if (stepText.startsWith('检查字段') || stepText.startsWith('🔍')) badge.className += ' skip';
      }

      // 状态文字：耗时 + 预估剩余
      const elapsed = p.elapsed_s || 0;
      const eta = p.eta_s || 0;
      let statusParts = [`已耗时 ${fmtETA(elapsed)}`];
      if (eta > 0) statusParts.push(`预计剩余 ${fmtETA(eta)}`);
      statusParts.push(`${pct}%`);
      $('#importStatus').textContent = statusParts.join(' · ');

      if (sd.status === 'done' || sd.status === 'error') {
        // 3. 完成 → 展示结果
        $('#importProgressBar').style.width = '100%';
        $('#importProgressPct').textContent = '100%';
        $('#importStepBadge').style.display = 'none';
        $('#importCurrentItem').textContent = '';
        // 添加 .done 类停止 shimmer 动画
        $('#importProgressBar').classList.add('done');

        const d = sd.result;
        if (d.ok) {
          let msg = '✅ 完成：' + d.success + ' 条成功，' + d.failed + ' 条失败（共 ' + d.total + ' 条）';
          if (d.failed > 0 && d.failure_detail) {
            const fd = d.failure_detail;
            const parts = [];
            if (fd.missing_title) parts.push(fd.missing_title + ' 条缺标题');
            if (fd.missing_image) parts.push(fd.missing_image + ' 条缺图片链接');
            if (fd.missing_both) parts.push(fd.missing_both + ' 条两者都缺');
            msg += '\n失败原因：' + parts.join('，') + '。';
            if (d.file_columns && d.file_columns.length) {
              msg += '\n文件列名：' + d.file_columns.join(', ');
            }
            msg += '\\n必填字段：title（标题）、main_image_url（图片链接）\\n非必填：description（详情介绍）、price（价格）等';
            if (d.sample) {
              msg += '\n示例：row=' + JSON.stringify(d.sample.row_sample)
                + ' title=' + (d.sample.title || '(空)')
                + ' image_url=' + (d.sample.main_image_url || '(空)');
            }
          }
          $('#importStatus').textContent = msg;
        } else {
          $('#importStatus').textContent = '❌ ' + (d.error || '入库失败');
        }
        if (d.errors && d.errors.length > 0) {
          $('#importStatus').textContent += ' | 错误: ' + d.errors.slice(0, 3).join('; ');
        }
        loadStats();
        break;
      }
    }
  } catch (e) {
    $('#importStatus').textContent = '入库失败: ' + e.message;
  } finally {
    // 在弹窗中保持进度条可见，方便查看结果
    $('#btnStartImport').disabled = false;
    $('#btnPreviewImport').disabled = false;
  }
});

const TPL_FIELDS = [
  { key: 'title', label: '商品标题', required: true },
  { key: 'platform', label: '平台', required: false },
  { key: 'price', label: '价格', required: true },

  { key: 'main_image_url', label: '图片链接', required: true },

  { key: 'shipping', label: '运费/物流', required: false },
];

function renderTplFields(mappings) {
  mappings = mappings || {};
  let html = '';
  TPL_FIELDS.forEach(f => {
    html += `<tr>
      <td><span class="field-key">${f.key}</span></td>
      <td><span class="field-label">${f.label}</span></td>
      <td><input type="text" class="tplFieldInput" data-key="${f.key}" value="${escAttr(mappings[f.key] || '')}"
        placeholder="${f.required ? '必需 — 填文件中的列名' : '选填'}"></td>
      <td><span class="badge-required ${f.required ? 'yes' : 'no'}">${f.required ? '必填' : '非必填'}</span></td>
    </tr>`;
  });
  $('#tplFieldBody').innerHTML = html;
}

function escAttr(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function showExportPicker() {
  // 关闭已有
  const old = document.querySelector('.export-picker');
  if (old) { old.remove(); return; }
  const btn = $('#btnExport');
  const rect = btn.getBoundingClientRect();
  const picker = document.createElement('div');
  picker.className = 'export-picker';
  picker.style.cssText = `position:fixed;top:${rect.bottom + 4}px;right:${window.innerWidth - rect.right}px;z-index:9999;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.4);min-width:190px;padding:4px`;
  picker.innerHTML = _exportFormats.map(f => `<button class="export-opt" data-fmt="${f.value}" style="display:block;width:100%;text-align:left;padding:10px 14px;border:none;background:transparent;color:var(--text-primary);font-size:13px;cursor:pointer;border-radius:6px;font-family:inherit">${f.label}</button>`).join('');
  document.body.appendChild(picker);
  picker.querySelectorAll('.export-opt').forEach(opt => {
    opt.addEventListener('click', async () => {
      picker.remove();
      doExport(opt.dataset.fmt);
    });
    opt.addEventListener('mouseenter', () => opt.style.background = 'var(--bg-tertiary)');
    opt.addEventListener('mouseleave', () => opt.style.background = 'transparent');
  });
  // 点击别处关闭
  setTimeout(() => {
    document.addEventListener('click', function closePicker(e) {
      if (!picker.contains(e.target) && e.target !== btn) {
        picker.remove();
        document.removeEventListener('click', closePicker);
      }
    });
  }, 0);
}

async function doExport(fmt) {
  const q = $('#mgmtSearch').value.trim();
  const platform = $('#mgmtPlatform').value;
  const btn = $('#btnExport');
  btn.textContent = '⏳ 导出中...';
  btn.disabled = true;
  try {
    // 拉取全部匹配数据（上限 5000 条）
    const r = await fetch(`${API}/products/search?q=${encodeURIComponent(q)}&platform=${platform}&limit=5000&page=1`);
    const d = await r.json();
    if (!d.ok || !d.products || !d.products.length) {
      toast('没有可导出的数据');
      btn.textContent = '📥 导出';
      btn.disabled = false;
      return;
    }
    const rows = d.products.map(p => ({
      title: p.title || '',
      platform: p.platform || '',
      price: p.price || 0,
      original_price: p.original_price || '',
      shop_name: p.shop_name || '',
      detail_url: p.detail_url || '',
      main_image_url: p.main_image_url || '',
      image_urls: Array.isArray(p.image_urls) ? p.image_urls.join(',') : (p.image_urls || ''),
      description: p.description || '',
    }));
    const headers = ['title','platform','price','original_price','shop_name','detail_url','main_image_url','image_urls','description'];
    const res = await fetch('/api/export/excel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rows, format: fmt, headers })
    });
    const ed = await res.json();
    if (!ed.ok) { toast('导出失败: ' + (ed.detail || '未知错误')); btn.textContent = '📥 导出'; btn.disabled = false; return; }
    // 下载
    const b = atob(ed.data);
    const u8 = new Uint8Array(b.length);
    for (let i = 0; i < b.length; i++) u8[i] = b.charCodeAt(i);
    const mime = { xlsx: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', csv: 'text/csv', json: 'application/json' }[fmt] || 'application/octet-stream';
    const blob = new Blob([u8], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = ed.filename || `export.${fmt}`;
    a.click();
    URL.revokeObjectURL(url);
    toast(`已导出 ${rows.length} 条数据`);
  } catch (e) {
    toast('导出失败: ' + e.message);
  }
  btn.textContent = '📥 导出';
  btn.disabled = false;
}

function renderPagination() {
  const container = $('#mgmtPagination');
  if (mgmtTotalPages <= 1) { container.innerHTML = ''; return; }
  let html = '';
  const makeBtn = (label, page, disabled) => {
    const d = disabled ? ' disabled' : '';
    const c = page === mgmtPage ? ' current' : '';
    return '<button class="' + c + '"' + d + ' onclick="mgmtPage=' + page + ';loadMgmtData()">' + label + '</button>';
  };
  html += makeBtn('\u00ab', 1, mgmtPage <= 1);
  html += makeBtn('\u2039', mgmtPage - 1, mgmtPage <= 1);
  for (let p = Math.max(1, mgmtPage - 2); p <= Math.min(mgmtTotalPages, mgmtPage + 2); p++) {
    html += makeBtn(p, p, false);
  }
  html += makeBtn('\u203a', mgmtPage + 1, mgmtPage >= mgmtTotalPages);
  html += makeBtn('\u00bb', mgmtTotalPages, mgmtPage >= mgmtTotalPages);
  container.innerHTML = html;
}
